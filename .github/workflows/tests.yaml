name: Tests

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:

jobs:
  tests:
    runs-on: "ubuntu-latest"
    name: "Python 3.13"
    steps:
      - uses: "actions/checkout@v4"
      - name: "Set up Python"
        uses: "actions/setup-python@v5"
        with:
          python-version: "3.13"
      - name: "Install requirements"
        run: |
          pip install -r requirements_test.txt
      - name: "Run tests"
        run: |
          python -m pytest tests/ \
            -v \
            --timeout=9 \
            --durations=10 \
            -p no:sugar \
            tests
